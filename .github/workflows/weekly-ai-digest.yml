name: Weekly AI Digest

on:
  schedule:
    # Jeden Montag um 07:00 UTC (= 09:00 Malta-Zeit im Sommer, 08:00 im Winter)
    - cron: "0 7 * * 1"
  workflow_dispatch: {}   # erlaubt manuelles Starten über den "Run workflow"-Button

permissions:
  contents: write   # nötig, damit der Workflow ein Release anlegen darf

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest PDF
        run: python generate_digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Determine file name and date
        id: vars
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Publish PDF as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: digest-${{ steps.vars.outputs.date }}
          name: "AI Digest – ${{ steps.vars.outputs.date }}"
          files: output/*.pdf
          body: "Automatically generated weekly AI digest with Claude summaries."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
